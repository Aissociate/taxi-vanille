upstream backend {
    server backend:3001;
    keepalive 32;
}

upstream frontend {
    server web:3000;
    keepalive 32;
}

# Rate limiting zones
# api: 300 req/min (5/s) -- covers automated tools and driver apps
# auth: 60 req/min -- generous for web users, still blocks brute-force
limit_req_zone $binary_remote_addr zone=api:10m rate=300r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=60r/m;

# ── HTTP (port 80) — Certbot challenge + redirection vers HTTPS ──────────────
server {
    listen 80;
    server_name app.taxivanille.yt _;

    # Certbot HTTP-01 challenge (servi en clair pour le renouvellement Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tout le reste → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS (port 443) ─────────────────────────────────────────────────────────
# ⚠️  Requiert que /etc/letsencrypt/live/app.taxivanille.yt/ existe (Certbot).
# Sur un déploiement frais : émettre d'abord les certs (voir DEPLOY.md §5.1)
# AVANT de monter ce nginx, sinon il refusera de démarrer.
server {
    listen 443 ssl http2;
    server_name app.taxivanille.yt;

    ssl_certificate     /etc/letsencrypt/live/app.taxivanille.yt/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.taxivanille.yt/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS — un an, sous-domaines inclus
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 20m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # ── API backend ──────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=100 nodelay;
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Auth — rate limit plus strict
    location /api/v1/auth/ {
        limit_req zone=auth burst=20 nodelay;
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # ── WebSocket (Socket.io) ────────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;
    }

    # ── Next.js static (cache agressif) ──────────────────────────────────────
    location /_next/static/ {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_cache_valid  200 365d;
        add_header         Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Frontend Next.js ─────────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_set_header   Upgrade    $http_upgrade;
    }

    # Health check (load balancer)
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
