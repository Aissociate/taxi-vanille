services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgis/postgis:16-3.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: taxivanille
      POSTGRES_USER: taxivanille
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taxivanille"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Application ─────────────────────────────────────────────────────────────

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://taxivanille:${DB_PASSWORD:-changeme}@postgres:5432/taxivanille
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production_min32chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_refresh_secret_min32chars}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-taxivanille}
      S3_REGION: ${S3_REGION:-}
      FCM_SERVER_KEY: ${FCM_SERVER_KEY:-}
      MAPBOX_TOKEN: ${MAPBOX_TOKEN:-}
      # Accept requests from nginx and direct mobile app
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:80,http://web:3000}
      PORT: 3001
      NODE_ENV: ${NODE_ENV:-production}
    # Internal only — exposed via nginx on port 80
    expose:
      - "3001"
    # Dev-only direct access. In prod, docker-compose.prod.yml clears this with `ports: []`.
    ports:
      - "127.0.0.1:${BACKEND_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # Next.js bakes NEXT_PUBLIC_* at build time — set to relative path for nginx
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
        NEXT_PUBLIC_MAPBOX_TOKEN: ${MAPBOX_TOKEN:-}
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "3000"
    healthcheck:
      # Next.js middleware redirige / vers /login → on cible /login directement.
      # --spider = HEAD-like, n'écrit rien sur disque ; --tries=1 = pas de retry interne.
      test: ["CMD-SHELL", "wget --spider --quiet --tries=1 http://localhost:3000/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Reverse proxy ────────────────────────────────────────────────────────────

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - web
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${HTTP_PORT:-80}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet --tries=1 http://localhost/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
