<title>Taxi Vanille — Direction & Coordinateurs</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#F26419;--brand-h:#F09514;--brand-d:#E04818;
  --ink-900:#1A1718;--ink-800:#262223;--ink-700:#393536;--ink-600:#5A5456;
  --ink-500:#817A7C;--ink-400:#A8A3A4;--ink-300:#CFCBCC;--ink-200:#E8E5E6;
  --ink-100:#F4F2F2;--ink-050:#FAF9F9;
  --success:#2E8B57;--warn:#E8A523;--danger:#D13A2A;--info:#3A6EA5;
  --accent-soft:rgba(242,100,25,0.12);
  --paper:#fbfaf8;--paper2:#f4f2ee;
  --stroke:#2a2627;--stroke2:#6b6566;--stroke3:#b9b3b4;--stroke4:#e3dedf;
  --font-sans:'Inter',-apple-system,sans-serif;
  --font-mono:'Space Mono',ui-monospace,monospace;
  --font-hand:'Caveat',cursive;
  --radius:8px;
  --sh-md:0 6px 16px rgba(25,20,20,.07),0 2px 4px rgba(25,20,20,.04);
  --sh-lg:0 18px 40px rgba(25,20,20,.10),0 4px 10px rgba(25,20,20,.05);
}
html,body{height:100%;font-family:var(--font-sans);font-size:16px;color:var(--stroke);background:var(--paper)}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* Layout */
#root{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:var(--paper);border-right:1.5px solid var(--stroke);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:18px 14px 14px;border-bottom:1px dashed var(--stroke3)}
.sidebar-logo .monogram{width:34px;height:34px;background:var(--stroke);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--font-mono);font-size:12px;font-weight:700;flex-shrink:0}
.sidebar-logo .brand-name{font-family:var(--font-mono);font-size:13px;font-weight:700}
.sidebar-logo .brand-sub{font-family:var(--font-mono);font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--stroke2)}
nav{flex:1;padding:10px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:6px;font-size:13px;font-weight:500;color:var(--stroke2);cursor:pointer;transition:background .12s;position:relative;border:1.5px solid transparent}
.nav-item:hover{background:var(--ink-100);color:var(--stroke)}
.nav-item.active{background:var(--stroke);color:#fff;font-weight:700}
.nav-item .nav-badge{margin-left:auto;font-family:var(--font-mono);font-size:9px;font-weight:800;background:var(--danger);color:#fff;padding:2px 6px;border-radius:999px}
.nav-item.alert-ring{border-color:var(--danger)}
.nav-dot{width:8px;height:8px;border-radius:50%;background:var(--danger);animation:pulse-ring 1.4s infinite;flex-shrink:0}
@keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(209,58,42,.55)}70%{box-shadow:0 0 0 10px rgba(209,58,42,0)}100%{box-shadow:0 0 0 0 rgba(209,58,42,0)}}
.sidebar-user{padding:12px 14px;border-top:1px dashed var(--stroke3);font-size:11px;color:var(--stroke2)}
.sidebar-user b{display:block;font-size:12px;color:var(--stroke)}

/* Main content */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.page-bar{padding:14px 24px;border-bottom:1.5px solid var(--stroke);display:flex;align-items:center;justify-content:space-between;background:#fff;flex-shrink:0}
.page-bar .pb-left .eyebrow{font-family:var(--font-mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--stroke2)}
.page-bar .pb-left h1{font-size:18px;font-weight:700;margin-top:2px}
.page-bar .pb-actions{display:flex;gap:8px}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:6px 14px;height:32px;font-size:12px;font-weight:700;font-family:var(--font-sans);border:2px solid var(--stroke);border-radius:8px;background:#fff;cursor:pointer;transition:background .12s,color .12s;white-space:nowrap}
.btn:hover{background:var(--ink-100)}
.btn-accent{background:var(--brand);border-color:var(--brand);color:#fff}
.btn-accent:hover{background:var(--brand-d);border-color:var(--brand-d)}
.btn-danger{background:var(--danger);border-color:var(--danger);color:#fff}
.btn-sm{padding:4px 10px;height:28px;font-size:11px}

/* Eyebrow */
.eyebrow{font-family:var(--font-mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--stroke2)}

/* Pills */
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border:1.25px solid var(--stroke2);border-radius:999px;font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--stroke);background:#fff;white-space:nowrap}
.pill .dot{width:6px;height:6px;border-radius:50%;background:var(--stroke2)}
.pill.live{border-color:var(--success);color:var(--success)}.pill.live .dot{background:var(--success)}
.pill.late{border-color:var(--warn);color:#9a6f10}.pill.late .dot{background:var(--warn)}
.pill.done{border-color:var(--stroke3);color:var(--stroke2)}.pill.done .dot{background:var(--stroke3)}
.pill.incident{border-color:var(--danger);color:var(--danger)}.pill.incident .dot{background:var(--danger)}
.pill.active-dark{background:var(--stroke);color:#fff;border-color:var(--stroke)}
.pill.active-brand{background:var(--brand);color:#fff;border-color:var(--brand)}

/* Cards */
.card{border:1.5px solid var(--stroke);background:#fff;border-radius:6px 7px 5px 8px / 5px 8px 6px 7px}
.card-soft{border:1.25px dashed var(--stroke3);background:var(--paper);border-radius:6px}

/* Divider dashed */
.divider-dash{height:1px;background:repeating-linear-gradient(90deg,var(--stroke3) 0 6px,transparent 6px 10px)}

/* Scribble placeholder */
.scribble{height:8px;background-image:repeating-linear-gradient(90deg,var(--stroke3) 0 14px,transparent 14px 18px);border-radius:2px;margin:6px 0}

/* Alert banner */
.alert-banner{display:flex;align-items:stretch;border-top:2px solid var(--danger);border-bottom:2px solid var(--danger);background:#fff;flex-shrink:0}
.alert-stripe{width:44px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--font-mono);font-weight:800;font-size:16px;background-image:repeating-linear-gradient(45deg,var(--danger) 0 8px,#b8311f 8px 16px);background-size:28px 28px;animation:stripes 1.4s linear infinite}
@keyframes stripes{from{background-position:0 0}to{background-position:28px 0}}
@keyframes blink{0%,60%{background:var(--danger);color:#fff}80%{background:#fff;color:var(--danger)}100%{background:var(--danger);color:#fff}}
.alert-pulse{width:12px;height:12px;border-radius:50%;background:var(--danger);animation:pulse-ring 1.4s infinite;flex-shrink:0}
.alert-badge{font-family:var(--font-mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;font-weight:800;color:var(--danger);padding:2px 6px;border:1.5px solid var(--danger);border-radius:3px;animation:blink 1.6s infinite}

/* Scroll areas */
.scroll{overflow:auto;flex:1}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;width:310px;z-index:999}
.toast-inner{border:2px solid var(--danger);border-radius:8px;background:#fff;padding:14px;box-shadow:0 12px 30px rgba(209,58,42,.25)}

/* Modal backdrop */
.modal-bg{position:fixed;inset:0;background:rgba(20,15,16,.38);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border:1.5px solid var(--stroke);border-radius:8px;box-shadow:0 30px 80px rgba(20,15,16,.35);max-height:90vh;overflow:hidden;display:flex;flex-direction:column}

/* Command palette */
.cmd-palette{position:fixed;left:50%;top:80px;transform:translateX(-50%);width:640px;z-index:200;background:#fff;border:1.5px solid var(--stroke);border-radius:8px;box-shadow:0 30px 80px rgba(20,15,16,.4);display:flex;flex-direction:column;max-height:calc(100vh - 120px)}

/* KPI block */
.kpi-block{border:1.5px solid var(--stroke);background:#fff;border-radius:6px;padding:16px}
.kpi-val{font-family:var(--font-mono);font-weight:700;font-size:28px;margin-top:6px;line-height:1}
.kpi-sub{font-size:11px;color:var(--stroke2);margin-top:4px}

/* Map */
.map-wrap{flex:1;position:relative;overflow:hidden}

/* Gantt */
.gantt-bar{position:absolute;top:8px;bottom:8px;border-radius:4px;display:flex;align-items:center;padding:0 8px;font-family:var(--font-mono);font-size:10px;font-weight:700;overflow:hidden;white-space:nowrap}

/* Sparkline SVG */
.sparkline{width:100%;height:60px}

/* Table */
table{width:100%;border-collapse:collapse;font-size:13px}
th{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--stroke2);padding:12px 14px;text-align:left;border-bottom:1.5px solid var(--stroke)}
td{padding:10px 14px;border-bottom:1px dashed var(--stroke3)}
tr:last-child td{border-bottom:none}

/* Timeline dot */
.tl-dot{position:absolute;left:-17px;top:4px;width:10px;height:10px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1.5px var(--stroke3)}

/* Waveform bar */
.wf-bar{width:3px;border-radius:1px;display:inline-block}

/* Stepper */
.step-num{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--stroke);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;font-weight:700}

/* Overlay blur */
.blurred{filter:blur(1.5px) saturate(.5);opacity:.6;pointer-events:none}

kbd{font-family:var(--font-mono);font-size:10px;padding:2px 6px;border:1px solid var(--stroke3);border-radius:4px;background:var(--paper)}

/* Focus ring for keyboard-nav */
*:focus-visible{outline:2px solid var(--brand);outline-offset:2px}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--stroke3);border-radius:999px}
</style>

// 01 – Planning Gantt
const GANTT_START = 4, GANTT_SPAN = 18; // 04h → 22h
const toPos = h => ((h - GANTT_START) / GANTT_SPAN) * 100;
const parseTime = s => { if (!s) return null; const [h, m] = s.split(':'); return parseInt(h) + parseInt(m) / 60; };

// Direction labels per line (AM = aller, PM = retour)
const LINE_DIR = {
  L3:  { am:'→ Passot La Barge', pm:'→ Doujani',      route:'Doujani ↔ Passot Barge' },
  L4:  { am:'→ Passamainty',     pm:'→ Vahibe',        route:'Vahibe ↔ PEM Passamainty' },
  CHM: { am:'→ La Barge',        pm:'→ CHM',           route:'CHM ↔ La Barge · 13 arrêts' },
};

const GanttRow = ({dr, lineLabel, lineColor, onReplace, incident}) => {
  const amParts = (dr.am||'').split('-');
  const pmParts = (dr.pm||'').split('-');
  const amStart = parseTime(amParts[0]), amEnd = parseTime(amParts[1]);
  const pmStart = parseTime(pmParts[0]), pmEnd = parseTime(pmParts[1]);
  const astrSegs = dr.astr ? dr.astr.split('·').map(s=>s.trim()) : [];
  const dir = LINE_DIR[lineLabel] || {am:'AM',pm:'PM',route:lineLabel};

  // Is this a full-day service (no separate PM, just one long AM block)?
  const isFullDay = amStart!=null && amEnd!=null && pmStart==null;

  return (
    <div style={{display:'grid',gridTemplateColumns:'230px 1fr',borderBottom:'1px solid var(--stroke3)',minHeight:52}}>
      {/* ── Left column : driver identity ── */}
      <div style={{padding:'7px 10px',borderRight:'1.5px solid var(--stroke)',display:'flex',flexDirection:'column',justifyContent:'center',gap:2,
        background:incident?'rgba(209,58,42,0.06)':'transparent'}}>
        <span style={{display:'flex',alignItems:'center',gap:5}}>
          <span style={{width:7,height:7,borderRadius:'50%',background:lineColor,flexShrink:0}}/>
          <span style={{fontWeight:700,fontSize:12,color:'var(--stroke)'}}>{dr.nom}</span>
          {incident&&<span style={{fontSize:10,color:'var(--danger)',fontWeight:700}}>⚠</span>}
        </span>
        <span style={{display:'flex',alignItems:'center',gap:5,paddingLeft:12}}>
          <span style={{fontFamily:'var(--font-mono)',fontSize:9,fontWeight:700,color:lineColor,padding:'0px 4px',border:`1px solid ${lineColor}`,borderRadius:2,letterSpacing:'.04em'}}>{lineLabel}</span>
          <span style={{fontFamily:'var(--font-mono)',fontSize:9,color:'var(--stroke2)'}}>
            {lineLabel==='L3'?'Doujani ↔ Barge':lineLabel==='L4'?'Vahibe ↔ PEM':'CHM ↔ Barge'}
          </span>
          <span style={{fontFamily:'var(--font-mono)',fontSize:8,color:'var(--stroke3)'}}>{dr.code}</span>

          <div className="gantt-bar" style={{left:`${toPos(amStart)}%`,width:`${toPos(amEnd)-toPos(amStart)}%`,
            background:incident?'var(--warn)':lineColor,color:'#fff',display:'flex',alignItems:'center',gap:4,overflow:'hidden'}}>

        {pmStart!=null&&pmEnd!=null&&(
          <div className="gantt-bar" style={{left:`${toPos(pmStart)}%`,width:`${toPos(pmEnd)-toPos(pmStart)}%`,
            background:`${lineColor}22`,border:`1.5px solid ${lineColor}`,color:lineColor,display:'flex',alignItems:'center',gap:4,overflow:'hidden'}}>
            <span style={{opacity:.7,fontSize:9,flexShrink:0}}>▶</span>
            <span style={{whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{dir.pm}</span>
          </div>
        )}
      </div>
    </div>
  );
};

// ─── Helpers doc status (module level, shared) ───────────────────────────────
const getDocStatus = doc => {
  if(!doc) return {st:'missing',color:'var(--stroke2)',label:'Manquant'};
  const days = (new Date(doc.e) - TODAY_DOC) / 86400000;
  if(days < 0)  return {st:'expired',color:'var(--danger)',label:'Expiré'};
  if(days < 60) return {st:'soon',   color:'var(--warn)',  label:'À renouveler'};
  return          {st:'ok',    color:'var(--success)',label:'Valide'};
};
const formatDocDate = e => e ? e.split('-').reverse().join('/') : '—';

const PERIOD_DATA = (sel, isChm) => {
  const b = isChm ? 680 : 1060;
  const v = ((sel % 9) + 1);
  return {
    jour:    {courses:3,           passagers:v+9,       ca:`${(b/22+v*3).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,' ')} €`, inc:0,   label:"Aujourd'hui"},
    semaine: {courses:17+v,        passagers:55+v*3,    ca:`${(b+v*30).toLocaleString('fr-FR')} €`,    inc:1,   label:'Semaine en cours (S19)'},
    mois:    {courses:68+v*2,      passagers:228+v*8,   ca:`${(b*4+v*100).toLocaleString('fr-FR')} €`, inc:2+Math.floor(v/3), label:'Mai 2026'},
    annee:   {courses:840+v*10,    passagers:2890+v*30, ca:`${(b*48+v*1000).toLocaleString('fr-FR')} €`,inc:8+v, label:'Année 2026'},
    total:   {courses:2400+v*20,   passagers:8300+v*60, ca:`${(b*138+v*3000).toLocaleString('fr-FR')} €`,inc:22+v*2,label:'Depuis le début'},
  };
};

                <Field label="Durée de session" value="8 h (auto-déconnexion)" half mono/>
                <Field label="Tentatives max. avant blocage" value="5" half mono/>
                <Field label="Durée de blocage" value="30 mn" half mono/>

};

// Modal – Replace Driver
const ModalReplaceDriver = ({onClose, target})=>{
  const isL3 = !target || target.code?.startsWith('D');
  const isL4 = target?.code?.startsWith('C');
  const isH   = target?.code?.startsWith('H');
  const candidatesL3 = [
    {code:'D5', name:'AMINA Selemani',       km:'0,8 km', avail:'libre 6:00-8:30',  match:'L3 · compatible',    best:true},
    {code:'D14',name:'AHAMADI Laydine',      km:'2,1 km', avail:'libre 6:10-8:10',  match:'L3 · astreinte dispo'},
    {code:'D13',name:'MOURIDI Aktoir',       km:'3,2 km', avail:'libre 5:30-8:30',  match:'L3 · compatible'},
    {code:'D3', name:'ABDOURAHIM Mohamed',   km:'4,5 km', avail:'repos demandé',    match:'L3 · à confirmer',   dim:true},
  ];
  const candidatesL4 = [
    {code:'C5', name:'AHAMADI Raenmouddine', km:'1,2 km', avail:'libre 6:00-9:30',  match:'L4 · compatible',    best:true},
    {code:'C9', name:'SANDI Maanrouf',       km:'2,0 km', avail:'libre 5:20-8:00',  match:'L4 · compatible'},
    {code:'C11',name:'MADI BOINA Mkidachi',  km:'3,1 km', avail:'libre 5:00-8:30',  match:'L4 · compatible'},
    {code:'C3', name:'ABDOU MINIHADJI Amada',km:'5,0 km', avail:'astreinte 17:00',  match:'L4 · après astreinte',dim:true},
  ];
  const candidatesH = [
    {code:'H3', name:'SAID ALI Kamile',      km:'0,5 km', avail:'libre 6:00-7:05',  match:'CHM · compatible',   best:true},
    {code:'H5', name:'ATTOUMANI Kamaldine',  km:'1,1 km', avail:'libre 5:45-7:50',  match:'CHM · compatible'},
    {code:'H2', name:'CHAMSSOUNE Ahmed',     km:'2,3 km', avail:'disponible',        match:'CHM · à confirmer'},
  ];
  const candidates = isH ? candidatesH : isL4 ? candidatesL4 : candidatesL3;
  const lineLabel  = isH ? 'CHM · Barge ↔ CHM' : isL4 ? 'L4 · Vahibe ↔ Passamainty' : 'L3 · Doujani ↔ Passot Barge';
  const defaultCourse = isH
    ? '06:30 La Barge → CHM · 13 arrêts'
    : isL4
    ? '07:00 Vahibe → Passamainty'
    : '14:40 Doujani → Passot Barge';
  return (
    <div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="modal" style={{width:720}}>
        {/* Header */}
        <div style={{padding:'16px 20px',borderBottom:'1.5px solid var(--stroke)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <Eyebrow>Action rapide · 3 étapes</Eyebrow>
            <div style={{fontSize:18,fontWeight:700,marginTop:2}}>Remplacer un chauffeur</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontFamily:'var(--font-hand)',fontSize:16,color:'var(--brand)'}}>↳ ⏱ &lt; 8 sec</span>
            <Btn onClick={onClose}>✕</Btn>
          </div>
        </div>
        {/* Stepper */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',borderBottom:'1.5px solid var(--stroke)',background:'var(--paper)'}}>
          {[{n:1,l:'Course à remplacer'},{n:2,l:'Nouveau chauffeur'},{n:3,l:'Confirmer + notifier'}].map((s,i)=>(
            <div key={s.n} style={{padding:'10px 14px',borderRight:i<2?'1px solid var(--stroke3)':'none',background:i===1?'#fff':'transparent',display:'flex',alignItems:'center',gap:10}}>
              <div className="step-num" style={{background:i<=1?'var(--stroke)':'#fff',color:i<=1?'#fff':'var(--stroke2)'}}>
                {i<1?'✓':s.n}
              </div>
              <div>
                <div style={{fontFamily:'var(--font-mono)',fontSize:9,letterSpacing:'.14em',textTransform:'uppercase',color:'var(--stroke2)'}}>Étape {s.n}</div>
                <div style={{fontSize:12,fontWeight:600}}>{s.l}</div>
              </div>
            </div>
          ))}
        </div>
        {/* Body */}
        <div style={{padding:18,overflow:'auto',maxHeight:'calc(90vh - 220px)'}}>
          <div className="card-soft" style={{padding:12,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <Eyebrow>Chauffeur à remplacer · {lineLabel}</Eyebrow>
              <div style={{marginTop:4,fontSize:13,fontWeight:600}}>{target?`${target.code} · ${target.nom}`:candidates[0]?.code} — {defaultCourse}</div>
              <div style={{fontFamily:'var(--font-mono)',fontSize:10,color:'var(--stroke2)',marginTop:2}}>{lineLabel} · raison : à préciser</div>
            </div>
            <span style={{fontFamily:'var(--font-hand)',fontSize:14,color:'var(--brand)'}}>← modifier</span>
          </div>
          <Eyebrow style={{marginTop:16}}>2. Choisir un remplaçant · classés par proximité GPS</Eyebrow>
          <div style={{marginTop:10,display:'flex',flexDirection:'column',gap:8}}>
            {candidates.map((c,i)=>(
              <div key={i} style={{display:'grid',gridTemplateColumns:'42px 1fr 90px 130px 90px',alignItems:'center',gap:12,padding:'10px 12px',
                border:`1.5px solid ${c.best?'var(--brand)':'var(--stroke3)'}`,borderRadius:6,
                background:c.best?'var(--accent-soft)':'#fff',opacity:c.dim?.55:1}}>
                <div style={{width:34,height:34,borderRadius:'50%',background:c.best?'var(--brand)':'var(--ink-100)',color:c.best?'#fff':'var(--stroke)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--font-mono)',fontSize:11,fontWeight:700}}>{c.code}</div>
                <div>
                  <div style={{fontSize:13,fontWeight:600}}>{c.name}</div>
                  <div style={{fontFamily:'var(--font-mono)',fontSize:10,color:'var(--stroke2)'}}>{c.match}</div>
                </div>
                <div style={{fontFamily:'var(--font-mono)',fontSize:11}}>{c.km}</div>
                <div style={{fontSize:11,color:'var(--stroke2)'}}>{c.avail}</div>
                <Btn accent={c.best} sm>{c.best?'Choisir →':'Choisir'}</Btn>
              </div>
            ))}
          </div>
          <div style={{marginTop:10,fontFamily:'var(--font-mono)',fontSize:10,color:'var(--stroke2)'}}>
            ↳ Astuce : ⏎ pour valider la suggestion en surbrillance
          </div>
        </div>
        {/* Footer */}
        <div style={{padding:'12px 18px',borderTop:'1.5px solid var(--stroke)',display:'flex',justifyContent:'space-between',alignItems:'center',background:'var(--paper)'}}>
          <div style={{fontSize:11,color:'var(--stroke2)'}}>
            ☑ Notifier remplaçant par push FCM · ☑ Notifier {isH?'CHM':'CADEMA'}
          </div>
          <div style={{display:'flex',gap:8}}>
            <Btn onClick={onClose}>← Retour</Btn>
            <Btn accent onClick={onClose}>Confirmer →</Btn>
          </div>
        </div>
      </div>
    </div>
  );
};

// Modal – Command Palette
const ModalCommand = ({onClose})=>{
  const [q,setQ] = useState('cadema');
  const inputRef = useRef(null);
  useEffect(()=>{inputRef.current?.focus()},[]);
  const results = [
    {scope:'Chauffeurs',items:[
      {code:'CH',main:'D1 · MOHAMED Ali',sub:'L3 · en service · 5:00-8:30'},
      {code:'CH',main:'D5 · AMINA Selemani',sub:'L3 · libre 6:00-8:30'},
    ]},
    {scope:'Courses',items:[
      {code:'CO',main:'C-2026-0387 · 14:40 DOUJANI → Passot Barge',sub:'D1 · vendredi 8 mai · 9 voyageurs'},
    ]},
    {scope:'Factures',items:[
      {code:'FA',main:'F-2026-0146 · 1 850,00 €',sub:'EL ANZIZE · S19 · à valider',tag:'À valider'},
    ]},
    {scope:'Clients · contrats',items:[
      {code:'CL',main:'CADEMA — L4 Vahibe ↔ Passamainty',sub:'618 trajets · 8 412 voyageurs · mars 2026'},
    ]},
  ];
  const highlighted = (text)=>{
    if(!q) return text;
    const re = new RegExp(`(${q})`, 'gi');
    const parts = text.split(re);
    return parts.map((p,i)=>p.toLowerCase()===q.toLowerCase()?<mark key={i} style={{background:'rgba(242,100,25,.35)',color:'var(--stroke)',padding:'0 2px'}}>{p}</mark>:<span key={i}>{p}</span>);
  };
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(20,15,16,.42)',zIndex:200}} onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="cmd-palette">
        {/* Input */}
        <div style={{padding:'14px 16px',borderBottom:'1.5px solid var(--stroke)',display:'flex',alignItems:'center',gap:12}}>
          <span style={{fontFamily:'var(--font-mono)',fontSize:16,color:'var(--stroke2)'}}>⌕</span>
          <input ref={inputRef} value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>{if(e.key==='Escape')onClose()}}
            placeholder="Rechercher…" style={{flex:1,fontSize:16,border:'none',outline:'none',fontFamily:'var(--font-sans)'}}/>
          <kbd onClick={onClose} style={{cursor:'pointer'}}>esc</kbd>
        </div>
        {/* Scopes */}
        <div style={{padding:'8px 14px',borderBottom:'1px dashed var(--stroke3)',display:'flex',gap:6,flexWrap:'wrap'}}>
          <span className="eyebrow" style={{alignSelf:'center'}}>Cherche dans :</span>
          {['Tout','Chauffeurs','Courses','Factures','Clients'].map((s,i)=>(
            <Pill key={i} variant={i===0?'active-dark':''}>{s}</Pill>
          ))}
        </div>
        {/* Results */}
        <div className="scroll">
          {results.map((sec,si)=>(
            <div key={si}>
              <div style={{padding:'10px 16px 4px',display:'flex',justifyContent:'space-between'}}>
                <Eyebrow>{sec.scope}</Eyebrow>
                <span style={{fontFamily:'var(--font-mono)',fontSize:9,color:'var(--stroke2)'}}>{sec.items.length} résultat{sec.items.length>1?'s':''}</span>
              </div>
              {sec.items.map((it,i)=>{
                const active=si===3&&i===0;
                return (
                  <div key={i} style={{padding:'10px 16px',background:active?'var(--accent-soft)':'#fff',
                    borderLeft:active?'3px solid var(--brand)':'3px solid transparent',
                    display:'grid',gridTemplateColumns:'32px 1fr auto',alignItems:'center',gap:12,cursor:'pointer'}}>
                    <div style={{width:26,height:26,borderRadius:4,background:active?'var(--brand)':'var(--ink-100)',
                      color:active?'#fff':'var(--stroke)',display:'flex',alignItems:'center',justifyContent:'center',
                      fontFamily:'var(--font-mono)',fontSize:9,fontWeight:700}}>{it.code}</div>
                    <div>
                      <div style={{fontSize:13,fontWeight:600}}>{highlighted(it.main)}</div>
                      <div style={{fontSize:11,color:'var(--stroke2)',marginTop:2}}>{it.sub}</div>
                    </div>
                    <div style={{display:'flex',gap:6,alignItems:'center'}}>
                      {it.tag&&<Pill variant="incident">{it.tag}</Pill>}
                      {active&&<kbd>⏎</kbd>}
                    </div>
                  </div>
                );
              })}
            </div>
          ))}
        </div>
        {/* Footer */}
        <div style={{padding:'10px 16px',borderTop:'1.5px solid var(--stroke)',background:'var(--paper)',display:'flex',justifyContent:'space-between',alignItems:'center',fontFamily:'var(--font-mono)',fontSize:10,color:'var(--stroke2)'}}>
          <div style={{display:'flex',gap:14}}>
            <span><kbd>↑↓</kbd> naviguer</span>
            <span><kbd>⏎</kbd> ouvrir</span>
            <span><kbd>Ctrl+K</kbd> partout</span>
          </div>
          <span>9 résultats · 38 ms</span>
        </div>
      </div>
    </div>
  );
};

// ─── SIDEBAR NAV ITEMS ───────────────────────────────────────────────────────
const NAV = [
  {id:'kpi',label:'Tableau de bord',icon:'📊'},
  {id:'planning',label:'Planning',icon:'📅'},
  {id:'map',label:'Carte temps réel',icon:'🗺',alert:true},
  {id:'drivers',label:'Chauffeurs',icon:'👤'},
  {id:'clients',label:'Clients',icon:'🏢'},
  {id:'invoices',label:'Factures',icon:'🧾',badge:'3'},
  {id:'reports',label:'Rapports',icon:'📄'},
  {id:'audit',label:'Audit log',icon:'📋'},
  {id:'parametrage',label:'Paramétrage',icon:'⚙'},
];

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [view,setView] = useState('kpi');
  const [showAlert,setShowAlert] = useState(true);
  const [showToast,setShowToast] = useState(true);
  const [showReplace,setShowReplace] = useState(false);
  const [replaceTarget,setReplaceTarget] = useState(null);
  const [showCmd,setShowCmd] = useState(false);
  const [replayMode,setReplayMode] = useState(false);

  // Global Ctrl+K
  useEffect(()=>{
    const handler = e=>{
      if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();setShowCmd(v=>!v)}
      if(e.key==='Escape'){setShowCmd(false);setShowReplace(false)}
    };
    window.addEventListener('keydown',handler);
    return ()=>window.removeEventListener('keydown',handler);
  },[]);

  return (
    <>
      <div id="root" style={{display:'flex',height:'100vh',overflow:'hidden'}}>
        {/* Sidebar */}
        <aside className="sidebar">
          <div className="sidebar-logo">
            <div className="monogram">TV</div>
            <div>
              <div className="brand-name">Vanille</div>
              <div className="brand-sub">Direction</div>
            </div>
          </div>
          <nav>
            {NAV.map(item=>{
              const activeId = view==='invoiceCreate'?'invoices':view==='customReport'?'reports':view==='replacement'?'audit':view;
              return (
              <div key={item.id} className={`nav-item${activeId===item.id?' active':''}${item.alert&&showAlert?' alert-ring':''}`}
                onClick={()=>setView(item.id)}>
                {item.alert&&showAlert&&<span className="nav-dot"/>}
                <span style={{flex:1}}>{item.label}</span>
                {item.badge&&!item.alert&&<span className="nav-badge">{item.badge}</span>}
                {item.alert&&showAlert&&<span className="nav-badge">2</span>}
              </div>
              );
            })}
          </nav>
          <div style={{padding:'10px 12px',borderTop:'1px dashed var(--stroke3)'}}>
            <Btn sm style={{width:'100%',marginBottom:8}} onClick={()=>setShowCmd(true)}>
              <span style={{marginRight:6}}>⌕</span> Recherche <kbd style={{marginLeft:'auto',fontSize:9}}>Ctrl+K</kbd>
            </Btn>
          </div>
          <div className="sidebar-user">
            <b>M. Aubin</b>
            Direction · connecté
          </div>
          <a href="Android.html" target="_blank" style={{
            display:'flex',alignItems:'center',gap:8,
            padding:'8px 14px 12px',
            textDecoration:'none',color:'var(--stroke3)',
            fontSize:10,fontFamily:'var(--font-mono)',letterSpacing:'.1em',
            transition:'color .15s',
          }}
            onMouseEnter={e=>e.currentTarget.style.color='var(--stroke2)'}
            onMouseLeave={e=>e.currentTarget.style.color='var(--stroke3)'}
          >
            <svg width="12" height="12" viewBox="0 0 14 14" fill="none" style={{flexShrink:0}}>
              <rect x="2" y="3" width="10" height="8" rx="1.5" stroke="currentColor" strokeWidth="1.4"/>
              <path d="M5 3V2M9 3V2" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/>
              <circle cx="5" cy="7" r="1" fill="currentColor"/>
              <circle cx="9" cy="7" r="1" fill="currentColor"/>
            </svg>
            App chauffeur
          </a>
        </aside>

        {/* Main */}
        <div className="main">
          {showAlert&&view!=='invoiceCreate'&&view!=='customReport'&&(
            <AlertBanner
              driver="D7 · COMBO Said"
              message="Vocal incident reçu · M'Tsapéré · panne moteur — demande remplaçant 12:00"
              age="14 s"
              onDismiss={()=>setShowAlert(false)}
              onReplace={()=>{setReplaceTarget(L3.find(d=>d.code==='D7'));setShowReplace(true);setShowAlert(false)}}
            />
          )}
          {view==='kpi'&&<ViewKPI/>}
          {view==='planning'&&<ViewPlanning onShowAlert={()=>setShowAlert(true)} onReplace={(dr)=>{setReplaceTarget(dr);setShowReplace(true)}}/>}
          {view==='map'&&<ViewMap replayMode={replayMode} setReplayMode={setReplayMode}/>}
          {view==='drivers'&&<ViewDrivers/>}
          {view==='invoices'&&<ViewInvoices onNew={()=>setView('invoiceCreate')}/>}
          {view==='invoiceCreate'&&<ViewInvoiceCreate onBack={()=>setView('invoices')}/>}
          {view==='reports'&&<ViewReports onCustom={()=>setView('customReport')}/>}
          {view==='customReport'&&<ViewCustomReport onBack={()=>setView('reports')}/>}
          {view==='audit'&&<ViewAudit/>}
          {view==='parametrage'&&<ViewParametrage/>}
          {view==='clients'&&(
            <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
              <PageBar title="Gestion clients" sub="Direction · 3 contrats actifs" actions={[{l:'+ Contrat',accent:true}]}/>
              <div className="scroll" style={{padding:24}}>
                {[{nom:'CADEMA — Ligne 3',sub:'Doujani ↔ Passot Barge · 14 chauffeurs',ca:'~38 240 € / mois',statut:'AO'},
                  {nom:'CADEMA — Ligne 4',sub:'Vahibe ↔ Passamainty (PEM) · 14 chauffeurs',ca:'~24 000 € / mois',statut:'AO'},
                  {nom:'CHM Petite-Terre',sub:'CHM ↔ La Barge · 13 arrêts · 8 chauffeurs',ca:'~8 600 € / mois',statut:'Marché'},
                ].map((c,i)=>(
                  <div key={i} className="card" style={{padding:20,marginBottom:16,background:'#fff'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                      <div>
                        <div style={{fontWeight:700,fontSize:18}}>{c.nom}</div>
                        <div style={{fontSize:13,color:'var(--stroke2)',marginTop:4}}>{c.sub}</div>
                      </div>
                      <Pill>{c.statut}</Pill>
                    </div>
                    <div className="divider-dash" style={{margin:'14px 0'}}/>
                    <div style={{display:'flex',gap:32,fontSize:13}}>
                      <div><Eyebrow>CA mensuel</Eyebrow><div style={{fontFamily:'var(--font-mono)',fontWeight:700,fontSize:20,marginTop:4}}>{c.ca}</div></div>
                      <div><Eyebrow>Trajets mars 2026</Eyebrow><div style={{fontFamily:'var(--font-mono)',fontWeight:700,fontSize:20,marginTop:4}}>{i===0?618:i===1?642:284}</div></div>
                    </div>
                    <div style={{display:'flex',gap:8,marginTop:14}}>
                      <Btn sm>Voir rapport</Btn>
                      <Btn sm>Factures</Btn>
                      <Btn sm accent>Planning</Btn>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>

      {/* Toast */}
      {showToast&&(
        <div className="toast">
          <div className="toast-inner">
            <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
              <div style={{width:28,height:28,borderRadius:'50%',flexShrink:0,background:'var(--danger)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,animation:'pulse-ring 1.4s infinite'}}>!</div>
              <div style={{flex:1}}>
                <div style={{fontSize:12,fontWeight:700}}>Nouvel incident</div>
                <div style={{fontSize:11,color:'var(--stroke2)',marginTop:2}}>D7 · COMBO Said a envoyé un vocal il y a 14 s · M'Tsapéré</div>
              </div>
              <button style={{color:'var(--stroke2)',fontSize:14}} onClick={()=>setShowToast(false)}>✕</button>
            </div>
            <div style={{display:'flex',gap:8,marginTop:12}}>
              <Btn sm style={{flex:1}} onClick={()=>{setView('map');setShowToast(false)}}>Voir sur la carte</Btn>
              <Btn sm accent style={{flex:1}} onClick={()=>{setReplaceTarget(L3.find(d=>d.code==='D7'));setShowReplace(true);setShowToast(false)}}>⇄ Remplacer</Btn>
            </div>
          </div>
        </div>
      )}

      {/* Modal – Replace driver */}
      {showReplace&&<ModalReplaceDriver target={replaceTarget} onClose={()=>{setShowReplace(false);setReplaceTarget(null)}}/>}

      {/* Command palette */}
      {showCmd&&<ModalCommand onClose={()=>setShowCmd(false)}/>}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
