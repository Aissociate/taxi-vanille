# docker-compose.prod.yml — Surcharges pour déploiement VPS
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Ce fichier ferme les ports directs (postgres, redis, backend)
# et ne laisse que nginx exposé sur le port 80 (+ 443 si TLS configuré).

services:
  postgres:
    # Pas de port exposé en prod — accessible uniquement en interne
    ports: []
    deploy:
      resources:
        limits:
          memory: 512m

  redis:
    ports: []
    deploy:
      resources:
        limits:
          memory: 128m

  backend:
    # Port direct fermé — passe uniquement par nginx
    ports: []
    environment:
      NODE_ENV: production
      # En prod, ALLOWED_ORIGINS doit pointer vers le domaine public
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
    deploy:
      resources:
        limits:
          memory: 512m
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  web:
    deploy:
      resources:
        limits:
          memory: 256m
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  nginx:
    ports:
      - "80:80"
      # Décommenter pour HTTPS (avec Certbot)
      # - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Décommenter pour TLS avec Let's Encrypt
      # - certbot_www:/var/www/certbot:ro
      # - certbot_certs:/etc/letsencrypt:ro
    deploy:
      resources:
        limits:
          memory: 64m

# Décommenter pour TLS
# volumes:
#   certbot_www:
#   certbot_certs:
