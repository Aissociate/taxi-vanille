# docker-compose.prod.yml — Surcharges pour déploiement VPS
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Ce fichier ferme les ports directs (postgres, redis, backend)
# et ne laisse que nginx exposé sur les ports 80 et 443.

services:
  postgres:
    # Pas de port exposé en prod — accessible uniquement en interne
    ports: []
    deploy:
      resources:
        limits:
          memory: 512m

  redis:
    ports: []
    deploy:
      resources:
        limits:
          memory: 128m

  backend:
    # Port direct fermé — passe uniquement par nginx
    ports: []
    environment:
      NODE_ENV: production
      # En prod, ALLOWED_ORIGINS doit pointer vers le domaine public.
      # Mettre les variantes http ET https tant que la migration TLS n'est pas terminée.
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://app.taxivanille.yt,http://app.taxivanille.yt}
    deploy:
      resources:
        limits:
          memory: 512m
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  web:
    deploy:
      resources:
        limits:
          memory: 256m
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Certbot webroot + certificats (créés au premier `certbot certonly`)
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    deploy:
      resources:
        limits:
          memory: 64m

  # ── Certbot (Let's Encrypt) ─────────────────────────────────────────────────
  # Service one-shot pour émettre / renouveler les certificats.
  # Lancer manuellement :
  #   docker compose -f docker-compose.yml -f docker-compose.prod.yml run --rm certbot certonly \
  #     --webroot -w /var/www/certbot -d app.taxivanille.yt \
  #     --email admin@taxivanille.yt --agree-tos --no-eff-email
  certbot:
    image: certbot/certbot:latest
    profiles: ["tls"]
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: /bin/sh -c
    command: ["trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"]

volumes:
  certbot_www:
  certbot_certs:
